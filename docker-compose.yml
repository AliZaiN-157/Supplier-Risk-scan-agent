# =============================================================================
# docker-compose.yml — Supplier Risk Scan Agent
# =============================================================================
# Start with:  docker-compose up --build
# Access:      http://localhost:3000
# Backend API: http://localhost:8000
# =============================================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supplier-risk-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/stats')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supplier-risk-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
